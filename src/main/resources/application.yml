spring:
  application:
    name: reservation
  profiles:
    active: local

---
server:
  port: 19095

spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres  # PostgreSQL URL
    driver-class-name: org.postgresql.Driver
    username: postgres  # PostgreSQL 기본 사용자명
    password: 1234  # PostgreSQL 비밀번호 (실제 비밀번호로 수정)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect  # PostgreSQL Dialect
  data:
    redis:
      host: localhost
      port: 6379
      username: default
      password: redis1234
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: reservation-group  # reservation 서비스면 reservation-group, payment는 payment-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    listener:
      ack-mode: record  # record 단위 ack (원하면 MANUAL로 변경 가능)

common:
  jpa:
    enabled: true