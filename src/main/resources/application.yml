spring:
  application:
    name: reservation-service
  profiles:
    active: local

---
server:
  port: 19095

spring:
  config:
    activate:
      on-profile: local


  datasource:
    url: jdbc:h2:mem:reservation
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

common:
  jpa:
    enabled: true